<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Modellbahn Betriebsstellen</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef1f5;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    h2 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* 📦 Betriebsstellen LISTE untereinander */
    .station {
      display: flex;
      align-items: baseline;
      gap: 10px;

      padding: 8px 10px;
      border-bottom: 1px solid #eee;
    }

    .station:last-child {
      border-bottom: none;
    }

    .station-id {
      font-weight: bold;
      min-width: 80px;
    }

    .station-name {
      color: #888; /* 👈 grau wie gewünscht */
      font-size: 14px;
    }

  </style>
</head>

<body>

<h2>🚆 Modellbahn Betriebsstellen</h2>

<!-- 📦 Betriebsstellen -->
<div class="card">
  <div class="title">🏷️ Übersicht</div>
  <div id="stations"></div>
</div>

<script>

const betriebsstellen = [
  { id: "RESD", name: "Eggenberg Straßebahndepot" },
  { id: "REED", name: "Eisenbahndepot" },
  { id: "REB", name: "Eggenberg Bahnhofstraße" },
  { id: "REN", name: "Bahnhof Eggenberg-Neufeld" },
  { id: "RENV", name: "Eggenberg-Neufeld Bahnhofsvorplatz" },
  { id: "RE", name: "Eggenberg" }
];

// 📦 Stations untereinander ausgeben
const stationBox = document.getElementById("stations");

betriebsstellen.forEach(b => {
  const div = document.createElement("div");
  div.className = "station";

  div.innerHTML = `
    <span class="station-id">${b.id}</span>
    <span class="station-name">${b.name}</span>
  `;

  stationBox.appendChild(div);
});

</script>

</body>
</html>
