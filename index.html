<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Modellbahn Routenplan</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef1f5;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    h2 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* 📦 Betriebsstellen */
    .stations {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .station {
      background: #f3f6fa;
      border: 1px solid #d0d7e2;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 14px;
      white-space: nowrap;
    }

    .station-id {
      font-weight: bold;
    }

    .station-name {
      color: #888;       /* 👈 HIER ist dein Wunsch: grau */
      font-size: 13px;
      margin-left: 6px;
    }

    /* 🔎 Inputs */
    select, button {
      padding: 8px;
      margin: 5px 5px 5px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #2b6cb0;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1f4f86;
    }

    /* 🚆 Route */
    .route {
      font-size: 16px;
      line-height: 1.8;
      padding: 10px;
    }

    .step {
      display: inline-block;
      padding: 4px 8px;
      margin: 3px;
      background: #f3f6fa;
      border-radius: 8px;
      border: 1px solid #d0d7e2;
    }

    .arrow {
      margin: 0 4px;
      color: #888;
    }

    .title {
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h2>🚆 Modellbahn Fahrweg-System</h2>

<!-- 📦 Betriebsstellen -->
<div class="card">
  <div class="title">🏷️ Betriebsstellen</div>
  <div id="stations" class="stations"></div>
</div>

<!-- 🔎 Suche -->
<div class="card">
  <div class="title">🔎 Route suchen</div>

  <select id="start"></select>
  <select id="ziel"></select>
  <button onclick="berechneRoute()">Route anzeigen</button>
</div>

<!-- 🚆 Ergebnis -->
<div class="card">
  <div class="title">🚆 Fahrweg</div>
  <div id="output" class="route">Noch keine Route gewählt.</div>
</div>

<script>

const betriebsstellen = [
  { id: "RESD", name: "Eggenberg Straßebahndepot" },
  { id: "REED", name: "Eisenbahndepot" },
  { id: "REB", name: "Eggenberg Bahnhofstraße" },
  { id: "REN", name: "Bahnhof Eggenberg-Neufeld" },
  { id: "RENV", name: "Eggenberg-Neufeld Bahnhofsvorplatz" },
  { id: "RE", name: "Eggenberg" },
];

const routen = [
  {
    from: "RESD1",
    to: "RESD2",
    path: ["RESD1", "W15", "RESW", "RESD2"]
  }
];

// 📦 Stations anzeigen
const stationBox = document.getElementById("stations");

betriebsstellen.forEach(b => {
  const div = document.createElement("div");
  div.className = "station";

  div.innerHTML = `
    <span class="station-id">${b.id}</span>
    <span class="station-name">${b.name}</span>
  `;

  stationBox.appendChild(div);
});

// 🔽 Dropdowns
const startSel = document.getElementById("start");
const zielSel = document.getElementById("ziel");

betriebsstellen.forEach(b => {
  startSel.add(new Option(b.name, b.id));
  zielSel.add(new Option(b.name, b.id));
});

// 🚆 Route berechnen
function berechneRoute() {
  const start = startSel.value;
  const ziel = zielSel.value;

  const route = routen.find(r => r.from === start && r.to === ziel);

  const output = document.getElementById("output");

  if (!route) {
    output.innerHTML = "❌ Keine Route gefunden.";
    return;
  }

  const steps = route.path.map(id => {
    const st = betriebsstellen.find(b => b.id === id);
    const label = st ? st.id : id;
    return `<span class="step">${label}</span>`;
  });

  output.innerHTML = steps.join('<span class="arrow">→</span>');
}

</script>

</body>
</html>
